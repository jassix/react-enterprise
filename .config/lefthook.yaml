commit-msg:
  commands:
    commitlint:
      run: bun x commitlint -g .config/commitlintrc.yaml --edit {1}

pre-commit:
  parallel: true
  skip:
    - merge
    - rebase
  commands:
    cspell-check:
      run: bun x cspell -c .vscode/cspell.json --gitignore {staged_files}
    oxlint-check:
      run: bun x oxlint -c .oxlintrc.json {staged_files}
    oxfmt-check:
      # Only run on formattable files (so commits touching only yaml/md/txt
      # don't trip oxfmt's "no targets" error), and exclude generated/vendored
      # files — oxfmt ignores its config `ignorePatterns` for explicit paths.
      glob: "*.{js,jsx,ts,tsx,json,jsonc}"
      exclude:
        - "*.gen.ts"
        - "*.gen.tsx"
        - "*.min.js"
      run: bun x oxfmt --check {staged_files}
